# Builds the Workspace engine container image and pushes it to ECR.
# Mirrors api-image.yml: build artifact only — `cdk deploy` runs interactively.
#
# Auth uses OIDC -> assume the capiro-gha-* role (same role family as the API;
# its ecr-push-capiro policy was extended to cover capiro/<env>/workspace).
#
# Build context is the REPOSITORY ROOT (the Dockerfile installs the pnpm
# workspace + generates the Prisma client), so this is NOT the sandbox pattern.

name: workspace-image

on:
  push:
    branches: [main]
    paths:
      - 'apps/workspace/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/workspace-image.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target env (dev|staging|prod)'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TARGET_ENV: ${{ github.event.inputs.env || 'dev' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.TARGET_ENV == 'prod' && vars.AWS_PROD_GHA_ROLE_ARN || vars.AWS_DEV_GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/workspace/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.ecr.outputs.registry }}/capiro/${{ env.TARGET_ENV }}/workspace:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/capiro/${{ env.TARGET_ENV }}/workspace:latest
          # Never cache the build stage — it runs `nest build` + `prisma
          # generate`, and a stale restore would freeze the compiled output.
          no-cache-filters: build
          cache-from: type=gha,scope=workspace
          cache-to: type=gha,mode=max,scope=workspace

      - name: Output image digest
        run: echo "Pushed capiro/${TARGET_ENV}/workspace:${GITHUB_SHA}"
