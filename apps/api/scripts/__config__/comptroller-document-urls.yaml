    index_url: https://www.asafm.army.mil/Budget-Materials/
    # FY2027 RDT&E detail volume URLs confirmed via the asafm Budget-Materials
    # index (path scheme: Portals/72/Documents/BudgetMaterial/2027/Discretionary Budget/rdte/).
    # NOTE: asafm.army.mil is WAF/IP-blocked from our build + AWS egress (connect
    # refused, HTTP 000). These URLs are correct but require a reachable fetch path
    # (allow-listed egress, a one-time manual download into S3, or a proxy) before
    # the R-2 sync can pull them. See README / handoff notes.
    rdte_base: "https://www.asafm.army.mil/Portals/72/Documents/BudgetMaterial/2027/Discretionary Budget/rdte"
    rdte_volumes:
      - volume_id: vol1_ba1
