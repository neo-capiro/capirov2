# apps/api/scripts/__config__/comptroller-document-urls.yaml
fy: 2027
publisher: DoD Comptroller (comptroller.war.gov)
notes: |
  Top-level summary docs live at comptroller.war.gov.
  Per-Service R-2 + P-Doc detail volumes live at each Service's FM&C site.
  Update URLs annually at PB release (typically Feb-Mar).

  Provenance requirement: every PE line ingested MUST persist the source
  document URL + page number so users can open the J-book at the exact page
  (deep link via "<pdf-url>#page=N") and screenshot the original exhibit.

top_level_summaries:
  r1:
    url: https://comptroller.war.gov/Portals/45/Documents/defbudget/FY2027/FY2027_r1.pdf
    role: rdte_master_list
    parse_priority: 1
  p1:
    url: https://comptroller.war.gov/Portals/45/Documents/defbudget/FY2027/FY2027_p1.pdf
    role: procurement_master_list
    parse_priority: 1

services:
  ARMY:
