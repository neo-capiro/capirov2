  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      Loaded BEFORE the Vite bundle so window.__CAPIRO_CONFIG__ is set when
      env.ts evaluates. In local dev the file does not exist (404 is harmless;

      entrypoint writes this file on boot.

    <script type="module" src="/src/main.tsx"></script>
