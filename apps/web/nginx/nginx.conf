# Capiro web nginx config.
# - Listen on 8080 (nginx-unprivileged base image runs as UID 101).
# - SPA fallback: any non-asset path serves /index.html.
# - /healthz for ALB target group health checks.
# - Strict cache headers: HTML never cached, hashed assets cached forever.
# - Security headers baked in. CSP intentionally permissive for now (Clerk
#   needs accounts.dev and clerk.app.capiro.ai); tighten when we ship a
#   stricter SecurityStack.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
    '"path":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"referer":"$http_referer","ua":"$http_user_agent","rt":$request_time}';
  access_log /dev/stdout json;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  client_max_body_size 25m;

  # tmp paths writable by the unprivileged user
  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  uwsgi_temp_path /tmp/uwsgi;
  scgi_temp_path /tmp/scgi;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml
             application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ALB health check.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    # Hashed Vite assets, long cache. The filename hash is the cache buster.
    location /assets/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Runtime config, never cache so a redeploy with new env vars is picked up.
    location = /runtime-config.js {
      add_header Cache-Control "no-store" always;
      add_header Content-Type "application/javascript" always;
      try_files $uri =404;
    }

    # index.html, never cache so users get the latest SPA shell.
    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files $uri =404;
    }

    # Security headers, applied to every response.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # SPA fallback, any unknown path serves index.html so React Router takes over.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
