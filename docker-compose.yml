# Local development stack. Mirrors the Aurora Postgres 16 + pgvector configuration
# we run in AWS, so RLS policies and pgvector queries behave the same locally as in prod.
services:
  postgres:
    # pgvector image bundles Postgres 16 + the pgvector extension.
    image: pgvector/pgvector:pg16
    container_name: capiro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: capiro
      POSTGRES_PASSWORD: capiro
      POSTGRES_DB: capiro
    ports:
      - "5432:5432"
    volumes:
      - capiro_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capiro -d capiro"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  capiro_pg_data:
