# Capiro marketing site nginx config.
# - Listens on 8080 (nginx-unprivileged base image runs as UID 101).
# - Static-only: serves index.html + /assets/*; no SPA fallback.
# - /healthz for ALB target group health checks.
# - Same security headers as the app (HSTS, CSP-friendly defaults).

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
    '"path":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"referer":"$http_referer","ua":"$http_user_agent","rt":$request_time}';
  access_log /dev/stdout json;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  client_max_body_size 1m;

  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  uwsgi_temp_path /tmp/uwsgi;
  scgi_temp_path /tmp/scgi;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml
             application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location /assets/ {
      access_log off;
      expires 30d;
      add_header Cache-Control "public, max-age=2592000" always;
      try_files $uri =404;
    }

    location = /index.html {
      add_header Cache-Control "no-store" always;
      try_files $uri =404;
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Marketing site is static, no SPA fallback. Unknown paths 404.
    location / {
      try_files $uri $uri/index.html =404;
    }
  }
}
